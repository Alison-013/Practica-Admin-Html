              <h2 class="page-title">USUARIOS</h2>
              <p class="page-description">Gestion Usuarios</p>
             </div>

            <section class="Usuario-section">
              <h3 class="page-description">Lista de Usuarios</h3>
              <div class="campoUsuario">

                  <td><button class="btn-Activo">+ Activo</button></td>
                </tr>

                <tr>

                </tr>

            <section class="Usuario-section">
              <h3 class="page-description">Registrar Usuario</h3>
              <div class="campo">
                <input type="text" placeholder="Nombre del Usuario">
              </div>
              <div class="campo">
                <input type="text" placeholder="Gmail">
              </div>
              <div class="campo">
