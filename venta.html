<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Admin Panel</title>
  </head>


  <body>
    
    <header class="header">
      <div class="header-content">
        <h1 class="logo">Panel Admin</h1>
        <div class="user-info">
          <span class="user-name"> Juan Perez</span>
          <div class="user-avatar">JP</div>
        </div>
      </div>
    </header>

    <div class="main-container">
      <aside class="sidebar">
        <nav class="sidebar-nav">

          <ul class="nav-list">
            <li class="nav-item">
              <a href="index.html" class="nav-link active">
                <span class="nav-icon"> 🏠</span>
                <span class="nav-text"> Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="producto.html" class="nav-link">
                <span class="nav-icon"> 💻</span>
                <span class="nav-text"> Producto</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="venta.html" class="nav-link">
                <span class="nav-icon"> 💵</span>
                <span class="nav-text"> Venta</span>
              </a>
            </li>
            <li>
                <a href="usuario.html" class="nav-link ">
                    <span class="nav-icon"> 👤</span>
                    <span class="nav-text"> Usuario</span>
                </a>
            </li>
            <li>
                <a href="configuracion.html" class="nav-link ">
                    <span class="nav-icon"> ⚙️</span>
                    <span class="nav-text">Configuracion</span>
                </a>
            </li>
          </ul>

        </nav>
      </aside>


       <main class="main-content">
             <div class="content-header">
              <h2 class="page-title">VENTAS</h2>
              <p class="page-description">Gestion de ventas</p>
             </div>

           <section class="Venta-section">
              <h3 class="page-description">Realizar Venta</h3>
              <div class="campo">
                <input type="text" placeholder="Nombre del cliente">
              </div>
              <div class="campo">
                <input type="text" placeholder="Producto">
              </div>
              <div class="campo">
                <input type="text" placeholder="Precio">
              </div>
              <button class="btn-agregarProducto">+ Agregar Producto</button>

            </section>

            <section class="Venta-section">
              <h3 class="page-description">Historial de Ventas</h3>
              <div class="campo">
                <input type="text" placeholder="Buscar Venta">
              </div>

              <table class="tabla">
                <tr>
                  <th>Cliente</th>
                  <th>Producto</th>
                  <th>Total</th>
                </tr>

                <tr>
                  <td>Maria</td>
                  <td>Laptop</td>
                  <td>$500</td>
                </tr>

                <tr>
                  <td>Juan</td>
                  <td>iPhone</td>
                  <td>$400</td>
                </tr>
              </table>
                  

            </section>
       </main>
  </body>
</html>
